<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>bright-just-listed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Poppins:wght@300;400;500;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #EDE7DD; }

  /* 01 · Just Listed — 1080x1080 Instagram feed — Bright & Airy */
  .canvas {
    width: 1080px; height: 1080px;
    background: #FBFAF7; color: #33322E;
    padding: 80px; position: relative;
    font-family: 'Lato', sans-serif;
    overflow: hidden;
  }

  /* Top bar */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 26px;
    border-bottom: 1px solid rgba(151,169,140,0.55);
  }
  .topbar .left { display: flex; align-items: center; gap: 16px; }
  .monogram {
    width: 40px; height: 40px; border: 1px solid #97A98C; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .monogram p {
    margin: 0; color: #97A98C;
    font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 500;
    font-size: 18px; line-height: 1; letter-spacing: 0.02em;
  }
  .brandName {
    font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 500;
    font-size: 24px; color: #33322E; line-height: 1;
  }
  .agentTitle {
    margin-top: 5px; font-family: 'Poppins', sans-serif; font-size: 8.5px;
    letter-spacing: 0.34em; text-transform: uppercase; font-weight: 400;
    color: #8A867E;
  }
  .topbar .pagelabel {
    font-family: 'Poppins', sans-serif; font-size: 10px;
    letter-spacing: 0.36em; text-transform: uppercase; color: #97A98C;
    font-weight: 500; line-height: 1;
  }

  /* Hero block */
  .hero {
    position: absolute; top: 220px; left: 80px; right: 80px;
    text-align: center;
  }
  .label { display: inline-flex; align-items: center; gap: 20px; }
  .label .line { width: 70px; height: 1px; background: #97A98C; }
  .label .txt {
    font-family: 'Poppins', sans-serif; font-size: 12.5px; letter-spacing: 0.44em;
    text-transform: uppercase; color: #97A98C; font-weight: 500; line-height: 1;
  }
  .headline {
    margin-top: 40px;
    font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-weight: 400;
    font-size: 132px; line-height: 0.92; color: #33322E; letter-spacing: -0.005em;
  }
  .addr {
    margin-top: 34px;
    font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 400;
    letter-spacing: 0.2em; text-transform: uppercase; color: #33322E;
  }
  .price {
    margin-top: 12px;
    font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 500;
    font-size: 38px; color: #97A98C; letter-spacing: 0.01em;
  }

  /* Feature row */
  .features {
    position: absolute; bottom: 250px; left: 80px; right: 80px;
    display: flex; justify-content: center; align-items: stretch; gap: 0;
  }
  .feat { flex: 1; text-align: center; padding: 0 14px; }
  .feat + .feat { border-left: 1px solid rgba(151,169,140,0.45); }
  .feat .num {
    font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 500;
    font-size: 46px; color: #33322E; line-height: 1;
  }
  .feat .cap {
    margin-top: 10px; font-family: 'Poppins', sans-serif; font-size: 10px;
    letter-spacing: 0.3em; text-transform: uppercase; color: #8A867E; font-weight: 400;
  }

  /* Bottom bar */
  .bottombar {
    position: absolute; bottom: 80px; left: 80px; right: 80px;
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid rgba(151,169,140,0.55); padding-top: 24px;
  }
  .bottombar .left { display: flex; align-items: center; gap: 12px; }
  .dot { width: 7px; height: 7px; background: #E6D2CB; border-radius: 50%; display: inline-block; }
  .handle {
    font-family: 'Poppins', sans-serif; font-size: 10px; letter-spacing: 0.26em;
    text-transform: uppercase; color: #8A867E; font-weight: 400;
  }
  .cta {
    font-family: 'Poppins', sans-serif; font-size: 10px; letter-spacing: 0.26em;
    text-transform: uppercase; color: #97A98C; font-weight: 500;
  }
</style>
</head>
<body>
<div class="canvas">

  <!-- Top bar -->
  <div class="topbar">
    <div class="left">
      <span class="monogram"><p>ME</p></span>
      <div>
        <div class="brandName">Maya Ellison</div>
        <div class="agentTitle">REALTOR&reg; &nbsp;|&nbsp; Modern Living</div>
      </div>
    </div>
    <div class="pagelabel">01 &middot; Just Listed</div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="label">
      <span class="line"></span>
      <span class="txt">Just Listed</span>
      <span class="line"></span>
    </div>
    <div class="headline">New on<br>the Market</div>
    <div class="addr">117 Larkspur Lane &middot; Austin, TX</div>
    <div class="price">$740,000</div>
  </div>

  <!-- Feature row -->
  <div class="features">
    <div class="feat"><div class="num">4</div><div class="cap">Bedrooms</div></div>
    <div class="feat"><div class="num">3</div><div class="cap">Bathrooms</div></div>
    <div class="feat"><div class="num">2,480</div><div class="cap">Sq Ft</div></div>
  </div>

  <!-- Bottom bar -->
  <div class="bottombar">
    <div class="left">
      <span class="dot"></span>
      <div class="handle">@mayaellison&nbsp;&middot;&nbsp;mayaellison.com</div>
    </div>
    <div class="cta">DM for details</div>
  </div>

</div>
</body>
</html>
