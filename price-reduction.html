<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>price-reduction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Montserrat:wght@300;400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #ece7dd; }
  .canvas { width: 1080px; height: 1080px; background: #F5F0E8; color: #0A0A0A; padding: 70px; position: relative; font-family: 'Lato', sans-serif; overflow: hidden; }
  .topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 24px; border-bottom: 0.5px solid rgba(10,10,10,0.16); }
  .topbar .left { display: flex; align-items: center; gap: 14px; }
  .monogram { width: 36px; height: 36px; border: 0.5px solid #0A0A0A; display: flex; align-items: center; justify-content: center; }
  .monogram p { margin: 0; color: #0A0A0A; font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-size: 16.56px; line-height: 1; }
  .brandName { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-size: 18px; color: #0A0A0A; line-height: 1; }
  .agentTitle { margin-top: 4px; font-family: 'Montserrat', sans-serif; font-size: 8px; letter-spacing: 0.28em; text-transform: uppercase; font-weight: 500; color: #0A0A0A; opacity: 0.65; }
  .pagelabel { font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; color: #C9A84C; font-weight: 600; line-height: 1; }
  .bottombar { position: absolute; bottom: 70px; left: 70px; right: 70px; display: flex; justify-content: space-between; align-items: center; border-top: 0.5px solid rgba(10,10,10,0.16); padding-top: 22px; }
  .bottombar .left { display: flex; align-items: center; gap: 10px; }
  .diamond { width: 6px; height: 6px; background: #C9A84C; transform: rotate(45deg); display: inline-block; }
  .handle { font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: #0A0A0A; opacity: 0.75; font-weight: 500; }
  .cta { font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: #C9A84C; font-weight: 600; }

  .body { padding-top: 56px; text-align: center; }
  .eyebrow { font-family: 'Montserrat', sans-serif; font-size: 11px; letter-spacing: 0.4em; text-transform: uppercase; color: #C9A84C; font-weight: 600; }
  .headline { margin-top: 22px; font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-size: 100px; line-height: 0.95; color: #0A0A0A; letter-spacing: -0.02em; }
  .sub { margin-top: 14px; font-family: 'Lato', sans-serif; font-size: 14px; color: #8a7d63; letter-spacing: 0.04em; }
  .prices { margin: 50px auto 0; display: grid; grid-template-columns: 1fr 60px 1fr; align-items: center; gap: 12px; max-width: 760px; }
  .plabel { font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; font-weight: 500; }
  .was .plabel { color: #8a7d63; }
  .now .plabel { color: #C9A84C; font-weight: 600; }
  .wasval { margin-top: 12px; font-family: 'Playfair Display', Georgia, serif; font-size: 56px; color: #8a7d63; line-height: 1; text-decoration: line-through; text-decoration-thickness: 1px; text-decoration-color: #C9A84C; }
  .arrow { font-family: 'Playfair Display', Georgia, serif; font-size: 36px; color: #C9A84C; font-style: italic; }
  .nowval { margin-top: 12px; font-family: 'Playfair Display', Georgia, serif; font-size: 72px; color: #0A0A0A; line-height: 1; font-weight: 600; letter-spacing: -0.02em; }
  .listing { max-width: 600px; margin: 56px auto 0; padding-top: 24px; border-top: 0.5px solid rgba(138,125,99,0.25); }
  .listing .addr { font-family: 'Playfair Display', Georgia, serif; font-size: 26px; color: #0A0A0A; font-style: italic; line-height: 1.2; }
  .listing .meta { margin-top: 6px; font-family: 'Lato', sans-serif; font-size: 13px; color: #8a7d63; }
</style>
</head>
<body>
<div class="canvas">
  <div class="topbar">
    <div class="left">
      <span class="monogram"><p>AM</p></span>
      <div>
        <div class="brandName">Alexandra Monroe</div>
        <div class="agentTitle">REALTOR® | Luxury Specialist</div>
      </div>
    </div>
    <div class="pagelabel">11 · New Price</div>
  </div>

  <div class="body">
    <div class="eyebrow">Price Improved</div>
    <div class="headline">New price.</div>
    <div class="sub">On a home that hasn't moved.</div>

    <div class="prices">
      <div class="was">
        <div class="plabel">Was</div>
        <div class="wasval">$1,395,000</div>
      </div>
      <div class="arrow">→</div>
      <div class="now">
        <div class="plabel">Now</div>
        <div class="nowval">$1,250,000</div>
      </div>
    </div>

    <div class="listing">
      <div class="addr">428 Ridgemont Drive</div>
      <div class="meta">Scottsdale, Arizona · 4 BD · 3.5 BA · 3,820 SF</div>
    </div>
  </div>

  <div class="bottombar">
    <div class="left">
      <span class="diamond"></span>
      <div class="handle">@alexandramonroe&nbsp;·&nbsp;alexandramonroe.com</div>
    </div>
    <div class="cta">Tour this week</div>
  </div>
</div>
</body>
</html>
