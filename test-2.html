<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>test-2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Montserrat:wght@300;400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #ece7dd; }
  /* 01 · Just Listed — 1080x1080 Instagram feed (DARK) */
  .canvas {
    width: 1080px; height: 1080px;
    background: #0A0A0A; color: #F5F0E8;
    padding: 70px; position: relative;
    font-family: 'Lato', sans-serif;
    overflow: hidden;
  }

  /* Top bar */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 24px;
    border-bottom: 0.5px solid rgba(245,240,232,0.18);
  }
  .topbar .left { display: flex; align-items: center; gap: 14px; }
  .monogram { position: relative; width: 36px; height: 36px; display: inline-block; }
  .monogram .box { position: absolute; inset: 0; border: 0.5px solid #F5F0E8; pointer-events: none; }
  .monogram p {
    position: absolute; inset: 0; margin: 0;
    display: flex; align-items: center; justify-content: center;
    color: #F5F0E8; font-family: 'Playfair Display', Georgia, serif;
    font-size: 16.56px; line-height: 1; font-style: italic;
  }
  .brandName {
    font-family: 'Playfair Display', Georgia, serif; font-style: italic;
    font-size: 18px; color: #F5F0E8; line-height: 1;
  }
  .agentTitle {
    margin-top: 4px; font-family: 'Montserrat', sans-serif; font-size: 8px;
    letter-spacing: 0.28em; text-transform: uppercase; font-weight: 500;
    color: #F5F0E8; opacity: 0.65;
  }
  .topbar .pagelabel {
    font-family: 'Montserrat', sans-serif; font-size: 10px;
    letter-spacing: 0.32em; text-transform: uppercase; color: #C9A84C;
    font-weight: 600; line-height: 1;
  }

  /* Main content grid */
  .grid {
    padding-top: 38px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 36px;
  }
  .eyebrow {
    font-family: 'Montserrat', sans-serif; font-size: 11px;
    letter-spacing: 0.32em; text-transform: uppercase; color: #C9A84C;
    font-weight: 600; line-height: 1;
  }
  .address {
    margin-top: 18px;
    font-family: 'Playfair Display', Georgia, serif; font-style: italic;
    font-size: 60px; line-height: 0.98; color: #F5F0E8;
  }
  .city {
    margin-top: 14px; font-family: 'Montserrat', sans-serif; font-size: 12px;
    letter-spacing: 0.28em; text-transform: uppercase; color: #F5F0E8;
    opacity: 0.7; font-weight: 500;
  }
  .price {
    margin-top: 32px; font-family: 'Playfair Display', Georgia, serif;
    font-size: 40px; color: #C9A84C; font-weight: 600;
  }
  .features { margin-top: 36px; display: flex; flex-direction: column; gap: 18px; }
  .features p {
    font-family: 'Lato', sans-serif; font-size: 22px; color: #F5F0E8;
    font-weight: 700; letter-spacing: 0;
  }

  /* Photo zone */
  .photo-wrap { position: relative; height: 720px; }
  .photo-wrap .ph {
    position: absolute; inset: 0; overflow: hidden; background: #1f1a12;
  }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* Bottom bar */
  .bottombar {
    position: absolute; bottom: 70px; left: 70px; right: 70px;
    display: flex; justify-content: space-between; align-items: center;
    border-top: 0.5px solid rgba(245,240,232,0.18); padding-top: 22px;
  }
  .bottombar .left { display: flex; align-items: center; gap: 10px; }
  .diamond { width: 6px; height: 6px; background: #C9A84C; transform: rotate(45deg); display: inline-block; }
  .handle {
    font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.28em;
    text-transform: uppercase; color: #F5F0E8; opacity: 0.75; font-weight: 500;
  }
  .cta {
    font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.28em;
    text-transform: uppercase; color: #C9A84C; font-weight: 600;
  }
</style>
</head>
<body>
<div class="canvas">

  <!-- Top bar -->
  <div class="topbar">
    <div class="left">
      <span class="monogram"><span class="box"></span><p>AM</p></span>
      <div>
        <div class="brandName">Alexandra Monroe</div>
        <div class="agentTitle">REALTOR® | Luxury Specialist</div>
      </div>
    </div>
    <div class="pagelabel">01 · Just Listed</div>
  </div>

  <!-- Main content -->
  <div class="grid">
    <div>
      <div class="eyebrow">Just Listed</div>
      <div class="address">428 Ridgemont Drive</div>
      <div class="city">Scottsdale, Arizona</div>
      <div class="price">$1,250,000</div>
      <div class="features">
        <p>4 Bedrooms&nbsp;·&nbsp;3.5 Bathrooms</p>
        <p>3,820 Square Feet</p>
        <p>Chef's Kitchen&nbsp;·&nbsp;Resort Pool</p>
        <p>Mountain Views&nbsp;·&nbsp;Smart Home</p>
      </div>
    </div>
    <div class="photo-wrap">
      <div class="ph">
        <img alt="EXTERIOR" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 750' preserveAspectRatio='xMidYMid slice'><defs><pattern id='s' patternUnits='userSpaceOnUse' width='14' height='14' patternTransform='rotate(45)'><rect width='14' height='14' fill='%231a1a1a'/><line x1='0' y1='0' x2='0' y2='14' stroke='rgba(245,240,232,0.08)' stroke-width='1.2'/></pattern></defs><rect width='600' height='750' fill='url(%23s)'/><g fill='rgba(245,240,232,0.5)' font-family='monospace' font-size='28' text-anchor='middle'><text x='300' y='370'>EXTERIOR</text><text x='300' y='400' font-size='18' opacity='0.6'>3:4</text></g></svg>">
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottombar">
    <div class="left">
      <span class="diamond"></span>
      <div class="handle">@alexandramonroe&nbsp;·&nbsp;alexandramonroe.com</div>
    </div>
    <div class="cta">DM for the full tour</div>
  </div>

</div>
</body>
</html>
