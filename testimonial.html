<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>testimonial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Montserrat:wght@300;400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #ece7dd; }
  .canvas { width: 1080px; height: 1080px; background: #0A0A0A; color: #F5F0E8; padding: 70px; position: relative; font-family: 'Lato', sans-serif; overflow: hidden; }
  .topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 24px; border-bottom: 0.5px solid rgba(245,240,232,0.18); }
  .topbar .left { display: flex; align-items: center; gap: 14px; }
  .monogram { width: 36px; height: 36px; border: 0.5px solid #F5F0E8; display: flex; align-items: center; justify-content: center; }
  .monogram p { margin: 0; color: #F5F0E8; font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-size: 16.56px; line-height: 1; }
  .brandName { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-size: 18px; color: #F5F0E8; line-height: 1; }
  .agentTitle { margin-top: 4px; font-family: 'Montserrat', sans-serif; font-size: 8px; letter-spacing: 0.28em; text-transform: uppercase; font-weight: 500; color: #F5F0E8; opacity: 0.65; }
  .pagelabel { font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; color: #C9A84C; font-weight: 600; line-height: 1; }
  .bottombar { position: absolute; bottom: 70px; left: 70px; right: 70px; display: flex; justify-content: space-between; align-items: center; border-top: 0.5px solid rgba(245,240,232,0.18); padding-top: 22px; }
  .bottombar .left { display: flex; align-items: center; gap: 10px; }
  .diamond { width: 6px; height: 6px; background: #C9A84C; transform: rotate(45deg); display: inline-block; }
  .handle { font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: #F5F0E8; opacity: 0.75; font-weight: 500; }
  .cta { font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: #C9A84C; font-weight: 600; }

  .body { position: absolute; top: 150px; left: 70px; right: 70px; padding-top: 0; text-align: center; }
  .stars { display: inline-flex; gap: 8px; align-items: center; }
  .quote { margin: 38px auto 0; font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-weight: 400; font-size: 38px; line-height: 1.3; color: #F5F0E8; max-width: 840px; }
  .quote .mark { color: #C9A84C; font-size: 88px; line-height: 0; vertical-align: -0.3em; }
  .quote .open { margin-right: 6px; }
  .quote .close { margin-left: 6px; }
  .attrib { margin-top: 48px; display: inline-flex; align-items: center; gap: 18px; }
  .attrib .line { width: 40px; height: 0.75px; background: #C9A84C; }
  .name { font-family: 'Playfair Display', Georgia, serif; font-size: 18px; color: #F5F0E8; font-style: italic; }
  .tcity { margin-top: 4px; font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; color: #F5F0E8; opacity: 0.6; font-weight: 500; }
</style>
</head>
<body>
<div class="canvas">
  <div class="topbar">
    <div class="left">
      <span class="monogram"><p>AM</p></span>
      <div>
        <div class="brandName">Alexandra Monroe</div>
        <div class="agentTitle">REALTOR® | Luxury Specialist</div>
      </div>
    </div>
    <div class="pagelabel">06 · Reviews</div>
  </div>

  <div class="body">
    <div class="stars">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="#C9A84C"><path d="M10 1.5l2.6 5.6 6.1.6-4.6 4.2 1.3 6L10 14.9 4.6 17.9l1.3-6L1.3 7.7l6.1-.6z"/></svg>
      <svg width="20" height="20" viewBox="0 0 20 20" fill="#C9A84C"><path d="M10 1.5l2.6 5.6 6.1.6-4.6 4.2 1.3 6L10 14.9 4.6 17.9l1.3-6L1.3 7.7l6.1-.6z"/></svg>
      <svg width="20" height="20" viewBox="0 0 20 20" fill="#C9A84C"><path d="M10 1.5l2.6 5.6 6.1.6-4.6 4.2 1.3 6L10 14.9 4.6 17.9l1.3-6L1.3 7.7l6.1-.6z"/></svg>
      <svg width="20" height="20" viewBox="0 0 20 20" fill="#C9A84C"><path d="M10 1.5l2.6 5.6 6.1.6-4.6 4.2 1.3 6L10 14.9 4.6 17.9l1.3-6L1.3 7.7l6.1-.6z"/></svg>
      <svg width="20" height="20" viewBox="0 0 20 20" fill="#C9A84C"><path d="M10 1.5l2.6 5.6 6.1.6-4.6 4.2 1.3 6L10 14.9 4.6 17.9l1.3-6L1.3 7.7l6.1-.6z"/></svg>
    </div>
    <div class="quote"><span class="mark open">“</span>Alexandra made the entire process seamless. We were under contract in 4 days and closed without a single hiccup. She is simply the best.<span class="mark close">”</span></div>
    <div class="attrib">
      <div class="line"></div>
      <div>
        <div class="name">Sarah &amp; David K.</div>
        <div class="tcity">Phoenix, AZ</div>
      </div>
      <div class="line"></div>
    </div>
  </div>

  <div class="bottombar">
    <div class="left">
      <span class="diamond"></span>
      <div class="handle">@alexandramonroe&nbsp;·&nbsp;alexandramonroe.com</div>
    </div>
    <div class="cta">More reviews ⤴</div>
  </div>
</div>
</body>
</html>
