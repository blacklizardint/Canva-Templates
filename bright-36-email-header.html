<!DOCTYPE html><html><head><meta charset="utf-8"><title>bright-36-email-header</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Poppins:wght@300;400;500;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"><style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#EDE7DD;}
  .canvas{width:1200px;height:400px;background:#EDE7DD;color:#33322E;padding:0px;position:relative;font-family:'Lato',sans-serif;overflow:hidden;}
  .serif{font-family:'Cormorant Garamond',Georgia,serif;} .sans{font-family:'Poppins',sans-serif;}
  .label{display:inline-flex;align-items:center;gap:20px;}
  .label .line{width:60px;height:1px;background:#97A98C;}
  .label .txt{font-family:'Poppins',sans-serif;font-size:12px;letter-spacing:.42em;text-transform:uppercase;color:#97A98C;font-weight:500;}
  .photo{background:#EDE7DD;border:1px solid rgba(151,169,140,0.45);display:flex;align-items:center;justify-content:center;}
  .photo .ptxt{font-family:'Poppins',sans-serif;font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:#8A867E;}
  .monogram{border:1px solid #97A98C;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .monogram p{color:#97A98C;font-family:'Cormorant Garamond',serif;font-weight:500;line-height:1;}
</style></head><body><div class="canvas"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#EDE7DD;">
  <span class="monogram" style="width:70px;height:70px;"><p style="font-size:30px;">ME</p></span>
  <div class="serif" style="margin-top:18px;font-style:italic;font-size:48px;">Maya Ellison</div>
  <div class="sans" style="margin-top:10px;font-size:10px;letter-spacing:.42em;text-transform:uppercase;color:#8A867E;">REALTOR&reg; &nbsp;|&nbsp; Modern Living</div></div></div></body></html>
