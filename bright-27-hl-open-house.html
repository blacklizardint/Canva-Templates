<!DOCTYPE html><html><head><meta charset="utf-8"><title>bright-27-hl-open-house</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Poppins:wght@300;400;500;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"><style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#EDE7DD;}
  .canvas{width:1080px;height:1080px;background:#FBFAF7;color:#33322E;padding:80px;position:relative;font-family:'Lato',sans-serif;overflow:hidden;}
  .serif{font-family:'Cormorant Garamond',Georgia,serif;} .sans{font-family:'Poppins',sans-serif;}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding-bottom:26px;border-bottom:1px solid rgba(151,169,140,0.55);}
  .tb-left{display:flex;align-items:center;gap:16px;}

  .agentTitle{margin-top:5px;font-family:'Poppins',sans-serif;font-size:8.5px;letter-spacing:.34em;text-transform:uppercase;color:#8A867E;}
  .pagelabel{font-family:'Poppins',sans-serif;font-size:10px;letter-spacing:.36em;text-transform:uppercase;color:#97A98C;font-weight:500;}
  .label{display:inline-flex;align-items:center;gap:20px;}
  .label .line{width:70px;height:1px;background:#97A98C;}
  .label .txt{font-family:'Poppins',sans-serif;font-size:12.5px;letter-spacing:.44em;text-transform:uppercase;color:#97A98C;font-weight:500;}
  .photo{background:#EDE7DD;border:1px solid rgba(151,169,140,0.40);display:flex;align-items:center;justify-content:center;}
  .photo .ptxt{font-family:'Poppins',sans-serif;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:#8A867E;}

      </div>

    </div></div></body></html>
